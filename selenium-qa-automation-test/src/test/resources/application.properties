# Application URLs
google.url=https://www.google.com/search?q=Google.com
selenium.docs.url=https://www.selenium.dev/documentation/

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=30
page.load.timeout=30

# Video recording settings
video.format=AVI
video.fps=15
video.quality=0.8f

# Screenshot settings
screenshot.format=PNG
screenshot.directory=./screenshots/

# Recording settings
recording.directory=./recordings/

# Browser settings
browser.name=chrome
browser.headless=false
browser.maximize=true
